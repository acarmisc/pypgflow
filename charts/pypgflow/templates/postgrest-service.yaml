apiVersion: v1
kind: Service
metadata:
  name: {{ include "pypgflow.fullname" . }}-postgrest
  labels:
    {{- include "pypgflow.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pypgflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
