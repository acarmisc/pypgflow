# Default values for pypgflow.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: postgrest/postgrest
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v11.2.2"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# CLI configuration
cli:
  image:
    repository: ghcr.io/your-repo/pypgflow-cli
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

# PostgreSQL configuration
postgresql:
  # -- Enable or disable the PostgreSQL dependency.
  # If enabled, a PostgreSQL StatefulSet will be deployed.
  # If disabled, you must provide connection details for an external database.
  enabled: true
  image: "postgres:15"
  user: "pypgflow"
  password: "pypgflow123"
  database: "pypgflow"
  port: 5432
  # -- Configuration for an external PostgreSQL database.
  # These values are used only when postgresql.enabled is false.
  external:
    host: ""
    port: 5432
    user: ""
    password: ""
    database: ""

# PostgREST configuration
postgrest:
  dbSchemas: "api"
  dbAnonRole: "anonymous"
  jwtSecret: "your-jwt-secret-here"
  openapiServerProxyUri: "http://localhost:3000"
  serverCorsAllowedOrigins: "*"

# Swagger UI configuration
swaggerui:
  enabled: true
  image: "swaggerapi/swagger-ui:latest"
  port: 8080
  swaggerJsonUrl: "http://pypgflow-postgrest:80/swagger.json"
  apiUrl: "http://pypgflow-postgrest:80/"
  baseUrl: "/"
